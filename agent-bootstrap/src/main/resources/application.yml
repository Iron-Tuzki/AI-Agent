server:
  port: 8080

spring:
  application:
    name: java-agent-learning
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/java_agent_learning?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}

agent:
  spring-ai:
    connect-timeout: ${AI_CONNECT_TIMEOUT:10s}
    read-timeout: ${AI_READ_TIMEOUT:120s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
